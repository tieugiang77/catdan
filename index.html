            const timeEl = document.getElementById('notch-time');
            if (!timeEl) return;
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            timeEl.textContent = `${hours}:${minutes} • ${day}/${month}`;
        }
        setInterval(updateNotchTime, 1000);
        updateNotchTime(); 
        (function createButtons() {
            let form_containers = Array.from(document.getElementsByClassName("txt-container"));
            form_containers.forEach((container) => {
                let button = document.createElement("button");
                button.innerText = "COPY";
                button.classList.add("btnCopy");
                button.onclick = async function () {
                    let copyText = button.previousElementSibling;
                    copyText.select();
                    copyText.setSelectionRange(0, 99999);
                    navigator.clipboard.writeText(copyText.value);
                    button.innerText = "Đã copy";
                    button.classList.add("btnCopied");
                    setTimeout(() => {
                        button.innerText = "COPY";
                        button.classList.remove("btnCopied");
                    }, 2000);
                };
                container.appendChild(button);
                let count_btn = document.createElement("button");
                count_btn.classList.add("btnCount");
                let id = button.previousElementSibling.id + "count";
                count_btn.id = id;
                count_btn.disabled = true;
                count_btn.hidden = true;
                container.appendChild(count_btn);
            });
        })();
		
        $(document).ready(function() {
            var $khungCuon = $("#khung-cuon-app");
            var $btnBackToTop = $("#back-to-top");
			
            $khungCuon.on("scroll", function() {
                if ($(this).scrollTop() > 200) {
                    $btnBackToTop.fadeIn(200);
                } else {
                    $btnBackToTop.fadeOut(200);
                }
            });
		
            $btnBackToTop.on("click", function(e) {
                e.preventDefault();
                $khungCuon.animate({scrollTop: 0}, 500);
            });
        });
		
        document.addEventListener('click', function(e) {
            if (e.target && e.target.tagName === 'BUTTON' && e.target.innerText.trim().toUpperCase() === 'COPY') {
                let container = e.target.closest('.txt-container') || e.target.parentElement;
                let textInput = container.querySelector('textarea, input');
                
                if (textInput && textInput.value.trim() === "") {
                    e.stopImmediatePropagation(); 
                    e.preventDefault();          
                }
            }
        }, true);</script></body></html>
