<div id="back-to-top" style="position:fixed!important;bottom:20px!important;right:20px!important;width:40px!important;height:40px!important;background-color:#007bff!important;color:#fff!important;text-align:center!important;line-height:40px!important;font-size:25px!important;font-weight:700!important;border-radius:50%!important;cursor:pointer!important;box-shadow:0 4px 15px rgba(0,123,255,.6)!important;z-index:999999!important;display:none;user-select:none;">&#8593;</div>				
			<script>
			function updateTime() {
				const timeDisplay = document.querySelector('.time-display');
				const now = new Date();
				const hours = String(now.getHours()).padStart(2, '0');
				const minutes = String(now.getMinutes()).padStart(2, '0');
				const seconds = String(now.getSeconds()).padStart(2, '0');
				const day = String(now.getDate()).padStart(2, '0');
				const month = String(now.getMonth() + 1).padStart(2, '0');
				const year = now.getFullYear();
				timeDisplay.textContent = `${hours}:${minutes}:${seconds} ${day}/${month}/${year}`;
			}
			setInterval(updateTime, 1000);
			updateTime(); 
				(function createButtons() {
					form_containers = Array.from(document.getElementsByClassName("txt-container"));
					form_containers.forEach((container) => {
						let button = document.createElement("button");
						button.innerText = "COPY";
						button.classList.add("btnCopy");
						button.onclick = async function () {
							copyText = button.previousElementSibling;
							copyText.select();
							copyText.setSelectionRange(0, 99999);
							navigator.clipboard.writeText(copyText.value);
							button.innerText = "Đã copy";
							button.classList.add("btnCopied");
							setTimeout(() => {
								button.innerText = "COPY";
								button.classList.remove("btnCopied");
							}, 2000);
						};
						container.appendChild(button);
						container.appendChild(button);
						let count_btn = document.createElement("button");
						count_btn.classList.add("btnCount");
						id = button.previousElementSibling.id + "count";
						count_btn.id = id;
						count_btn.disabled = true;
						count_btn.hidden = true;
						container.appendChild(count_btn);
					});
				})();

$(document).ready(function() {
    var $btnBackToTop = $("#back-to-top");
	

    $(window).on("scroll", function() {
        if ($(this).scrollTop() > 200) {
            $btnBackToTop.fadeIn(200); 
        } else {
            $btnBackToTop.fadeOut(200);
        }
    });
    $btnBackToTop.on("click", function(e) {
        e.preventDefault();
        $("html, body").animate({scrollTop: 0}, 500);
    });
});

                let textInput = container.querySelector('textarea, input');
                
                if (textInput && textInput.value.trim() === "") {
                    e.stopImmediatePropagation();
